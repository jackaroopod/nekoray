name: Nekoray build - Windows Only

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release Tag"
        required: true

jobs:
  build-go:
    strategy:
      matrix:
        cross_os: [windows, public_res]
        cross_arch: [amd64]
    runs-on: ubuntu-latest
    steps:
      - name: Checking out sources
        uses: actions/checkout@v4
      - name: Install Golang
        uses: actions/setup-go@v4
        with:
          go-version: ^1.22
      - name: Build golang parts
        shell: bash
        run: |
          if [ "${{ matrix.cross_os }}" == "public_res" ]; then
            ./libs/build_public_res.sh
          else
            ./libs/get_source.sh
            GOOS=${{ matrix.cross_os }} GOARCH=${{ matrix.cross_arch }} ./libs/build_go.sh
          fi
      - name: Tar files
        run: tar czvf artifacts.tgz ./deployment
      - name: Uploading Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NekoRay-Go-${{ matrix.cross_os }}
          path: artifacts.tgz

  build-cpp:
    runs-on: windows-2022
    steps:
      - name: Checking out sources
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
      - name: Install MSVC compiler
        uses: ilammy/msvc-dev-cmd@v1
        with:
          toolset: 14.2
          arch: x64
      - name: Windows - Download Custom Qt 6.7 SDK
        shell: bash
        run: bash ./libs/download_qtsdk_win.sh
      - name: Install ninja-build tool
        uses: seanmiddleditch/gha-setup-ninja@v4
      - name: Build Dependencies
        shell: bash
        run: ./libs/build_deps_all.sh
      - name: Windows - Generate MakeFile and Build
        shell: bash
        env:
          DL_QT_VER: "6.7"
          CC: cl.exe
          CXX: cl.exe
        run: |
          source libs/env_qtsdk.sh $PWD/qtsdk/Qt
          mkdir build
          cd build
          cmake -GNinja -DQT_VERSION_MAJOR=6 -DCMAKE_BUILD_TYPE=Release ..
          ninja -j2
          cd ..
          ./libs/deploy_windows64.sh
      - name: Tar files
        shell: bash
        run: tar czvf artifacts.tgz ./deployment
      - name: Uploading Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NekoRay-Cpp-Windows
          path: artifacts.tgz

  publish:
    name: Pack Final Build
    runs-on: ubuntu-latest
    needs: [build-cpp, build-go]
    steps:
      - name: Checking out sources
        uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: download-artifact
      - name: Pack Windows
        run: |
          find . -name artifacts.tgz | xargs -n1 tar xvzf
          cd deployment
          cp -r public_res/* windows64/
          mv windows64 nekoray
          zip -r ../nekoray-windows-x64.zip nekoray
      - name: Upload Final Zip
        uses: actions/upload-artifact@v4
        with:
          name: Nekoray-Windows-Fresh-Build
          path: nekoray-windows-x64.zip
